name: Build Geode Mod (All Platforms)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # -------------------------
  # WINDOWS
  # -------------------------
  windows:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install CMake
      uses: lukka/get-cmake@v3

    - name: Set up Geode SDK
      run: |
        git clone https://github.com/geode-sdk/geode.git --depth=1
        echo "GEODE_SDK=$PWD/geode" >> $env:GITHUB_ENV

    - name: Configure
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DGEODE_PLATFORM=windows

    - name: Build
      run: cmake --build build --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XXLify-Windows
        path: build/*.geode


  # -------------------------
  # MACOS
  # -------------------------
  macos:
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install CMake
      run: brew install cmake ninja

    - name: Set up Geode SDK
      run: |
        git clone https://github.com/geode-sdk/geode.git --depth=1
        echo "GEODE_SDK=$PWD/geode" >> $GITHUB_ENV

    - name: Configure
      run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DGEODE_PLATFORM=macos

    - name: Build
      run: cmake --build build --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XXLify-macOS
        path: build/*.geode


  # -------------------------
  # ANDROID 32
  # -------------------------
  android32:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install CMake
      run: sudo apt-get install -y cmake ninja-build

    - name: Set up Geode SDK
      run: |
        git clone https://github.com/geode-sdk/geode.git --depth=1
        echo "GEODE_SDK=$PWD/geode" >> $GITHUB_ENV

    - name: Configure
      run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DGEODE_PLATFORM=android32

    - name: Build
      run: cmake --build build --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XXLify-Android32
        path: build/*.geode


  # -------------------------
  # ANDROID 64
  # -------------------------
  android64:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install CMake
      run: sudo apt-get install -y cmake ninja-build

    - name: Set up Geode SDK
      run: |
        git clone https://github.com/geode-sdk/geode.git --depth=1
        echo "GEODE_SDK=$PWD/geode" >> $GITHUB_ENV

    - name: Configure
      run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DGEODE_PLATFORM=android64

    - name: Build
      run: cmake --build build --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XXLify-Android64
        path: build/*.geode


  # -------------------------
  # IOS (NEW)
  # -------------------------
  ios:
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install CMake
      run: brew install cmake ninja

    - name: Set up Geode SDK
      run: |
        git clone https://github.com/geode-sdk/geode.git --depth=1
        echo "GEODE_SDK=$PWD/geode" >> $GITHUB_ENV

    - name: Configure
      run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DGEODE_PLATFORM=ios

    - name: Build
      run: cmake --build build --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XXLify-iOS
        path: build/*.geode
